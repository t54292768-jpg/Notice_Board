<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Link - 캘린더 상세</title>
    
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/Calendar/calendar.css">

    <script src="/JS/header-loader.js" defer></script>
</head>
<body>

    <main class="calendar-page-wrapper calendar-split-layout">
        <section class="schedule-left-panel">
            <div class="selected-date-header">
                <h3 id="target-date-title">2026년 07월 10일</h3>
                <p id="target-date-sub">오늘의 상세 시간별 스케줄 타임라인</p>
            </div>
            <div class="timeline-scroll-area" id="timeline-box"></div>
        </section>

        <section class="calendar-right-panel">
            <div class="calendar-ctrl-bar">
                <div class="month-selector">
                    <h2 id="calendar-month-title">2026년 07월</h2>
                    <div class="calendar-btn-group">
                        <button class="cal-btn" id="btn-prev">이전달</button>
                        <button class="cal-btn" id="btn-today">오늘</button>
                        <button class="cal-btn" id="btn-next">다음달</button>
                    </div>
                </div>
                <div class="action-btn-group">
                    <button class="action-btn btn-plan" id="add-plan-btn"><span>💡</span> 계획 추가</button>
                    <button class="action-btn btn-schedule" id="add-schedule-btn"><span>➕</span> 일정 추가</button>
                </div>
            </div>

            <table class="full-calendar-table">
                <thead>
                    <tr><th>일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th></tr>
                </thead>
                <tbody id="calendar-body"></tbody>
            </table>
        </section>
    </main>

    <script src="/JS/calendar-core.js"></script>
    <script>
        window.addEventListener('load', function() {
            let currentDate = new Date(); 
            let selectedDateStr = `${currentDate.getFullYear()}.${currentDate.getMonth()+1}.${currentDate.getDate()}`;

            const monthTitle = document.getElementById('calendar-month-title');
            const calendarBody = document.getElementById('calendar-body');
            const targetDateTitle = document.getElementById('target-date-title');
            const timelineBox = document.getElementById('timeline-box');

            // 타임라인 렌더링 (엔진 데이터 반영)
            function renderTimeline(dayNum) {
                let timelineHtml = '';
                const currentMonthName = monthTitle.innerText;
                targetDateTitle.innerText = `${currentMonthName} ${dayNum}일`;

                // 24시간 틀 만들기
                for(let hour = 0; hour < 24; hour++) {
                    let ampm = hour < 12 ? '오전' : '오후';
                    let displayHour = hour % 12 === 0 ? 12 : hour % 12;
                    
                    timelineHtml += `
                        <div class="time-row">
                            <div class="time-label">${ampm} ${displayHour}시</div>
                            <div class="time-content" id="time-${hour}"></div>
                        </div>
                    `;
                }
                timelineBox.innerHTML = timelineHtml;

                // 💡 로컬 스토리지에 저장된 실제 데이터 필터링 후 꽂아넣기
                const schedules = getCalendarData();
                const currentYear = currentDate.getFullYear();
                const currentMonth = currentDate.getMonth() + 1;
                const targetKey = `${currentYear}.${currentMonth}.${dayNum}`;

                const todaySchedules = schedules.filter(s => s.date === targetKey);
                todaySchedules.forEach(item => {
                    const timeCell = timelineBox.querySelector(`#time-${item.hour}`);
                    if (timeCell) {
                        const cardClass = item.type === 'plan' ? 'timeline-event-card plan' : 'timeline-event-card';
                        timeCell.innerHTML = `<div class="${cardClass}">${item.text}</div>`;
                    }
                });
            }

            // 달력 테이블 렌더링 (엔진 데이터 반영)
            function renderCalendar(date) {
                const year = date.getFullYear();
                const month = date.getMonth();

                monthTitle.innerText = `${year}년 ${String(month + 1).padStart(2, '0')}월`;

                const firstDayIndex = new Date(year, month, 1).getDay(); 
                const lastDate = new Date(year, month + 1, 0).getDate(); 
                const prevLastDate = new Date(year, month, 0).getDate(); 

                let htmlContent = '';
                let dayCounter = 1;
                let nextMonthCounter = 1;

                const schedules = getCalendarData(); // 💡 데이터 가져오기

                for (let i = 0; i < 6; i++) {
                    let rowHtml = '<tr>';
                    for (let j = 0; j < 7; j++) {
                        let tdClass = '';
                        if (j === 0) tdClass = 'td-sun';
                        if (j === 6) tdClass = 'td-sat';

                        if (i === 0 && j < firstDayIndex) {
                            const prevDay = prevLastDate - (firstDayIndex - 1) + j;
                            rowHtml += `<td class="${tdClass} other-month"><span class="day-number">${prevDay}</span></td>`;
                        } 
                        else if (dayCounter <= lastDate) {
                            const isToday = (year === new Date().getFullYear() && month === new Date().getMonth() && dayCounter === new Date().getDate());
                            if (isToday) tdClass += ' today td-today';

                            const thisCellStr = `${year}.${month+1}.${dayCounter}`;
                            if(selectedDateStr === thisCellStr) tdClass += ' selected-cell';

                            rowHtml += `<td class="${tdClass}" data-day="${dayCounter}"><span class="day-number">${dayCounter}</span>`;
                            
                            // 💡 미니 배지 동적 렌더링 영역
                            const cellSchedules = schedules.filter(s => s.date === thisCellStr);
                            cellSchedules.forEach(item => {
                                const badgeColor = item.type === 'plan' ? 'm-green' : 'm-blue';
                                rowHtml += `<div class="mini-badge ${badgeColor}">${item.text}</div>`;
                            });

                            rowHtml += `</td>`;
                            dayCounter++;
                        } 
                        else {
                            rowHtml += `<td class="${tdClass} other-month"><span class="day-number">${nextMonthCounter}</span></td>`;
                            nextMonthCounter++;
                        }
                    }
                    rowHtml += '</tr>';
                    if (dayCounter > lastDate && i === 5) break;
                    htmlContent += rowHtml;
                }
                calendarBody.innerHTML = htmlContent;

                // 셀 클릭 이벤트 바인딩
                const cells = calendarBody.querySelectorAll('td:not(.other-month)');
                cells.forEach(cell => {
                    cell.addEventListener('click', function() {
                        const prevSelected = calendarBody.querySelector('.selected-cell');
                        if(prevSelected) prevSelected.classList.remove('selected-cell');
                        this.classList.add('selected-cell');
                        
                        const clickedDay = this.getAttribute('data-day');
                        selectedDateStr = `${year}.${month+1}.${clickedDay}`;
                        renderTimeline(clickedDay);
                    });
                });
            }

            // --- [계획 및 일정 등록 버튼 연동 핸들러] ---
            function handleAddEvent(type) {
                const text = prompt(type === 'plan' ? '새로운 계획을 입력하세요:' : '새로운 일정을 입력하세요:');
                if (!text) return;
                const hour = prompt('시작 시간(0~23)을 숫자로만 입력하세요:', '12');
                if (hour === null || isNaN(hour) || hour < 0 || hour > 23) return alert('올바른 시간을 입력해주세요.');

                // 엔진 함수 호출하여 로컬스토리지 저장
                addCalendarItem(selectedDateStr, hour, text, type);
                
                // 화면 리렌더링
                const currentDay = selectedDateStr.split('.')[2];
                renderCalendar(currentDate);
                renderTimeline(currentDay);
            }

            document.getElementById('add-plan-btn').addEventListener('click', () => handleAddEvent('plan'));
            document.getElementById('add-schedule-btn').addEventListener('click', () => handleAddEvent('schedule'));

            // 달력 제어 버튼들
            document.getElementById('btn-prev').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar(currentDate);
                renderTimeline(1);
            });
            document.getElementById('btn-next').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar(currentDate);
                renderTimeline(1);
            });
            document.getElementById('btn-today').addEventListener('click', () => {
                currentDate = new Date();
                selectedDateStr = `${currentDate.getFullYear()}.${currentDate.getMonth()+1}.${currentDate.getDate()}`;
                renderCalendar(currentDate);
                renderTimeline(currentDate.getDate());
            });

            // 초기 실행
            renderCalendar(currentDate);
            renderTimeline(currentDate.getDate());
        });
    </script>
</body>
</html>
