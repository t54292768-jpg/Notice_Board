<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Link - 다이어리</title>
    
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="diary_p.css">

    <script src="/JS/header-loader.js" defer></script>
</head>
<body>

    <main class="diary-page-container">
        <header class="diary-welcome-header">
            <h2><span id="user-name-display">홍길동</span>님의 다이어리 📖</h2>
            <p>날짜를 선택하여 오늘의 소중한 기록을 남겨보세요.</p>
        </header>

        <div class="diary-split-layout">
            
            <section class="diary-left-panel">
                <div class="calendar-ctrl-bar">
                    <h3 id="calendar-month-title">2026년 07월</h3>
                    <div class="calendar-btn-group">
                        <button class="cal-btn" id="btn-prev">이전달</button>
                        <button class="cal-btn" id="btn-today">오늘</button>
                        <button class="cal-btn" id="btn-next">다음달</button>
                    </div>
                </div>

                <table class="diary-calendar-table">
                    <thead>
                        <tr><th>일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th></tr>
                    </thead>
                    <tbody id="calendar-body"></tbody>
                </table>
            </section>

            <section class="diary-right-panel">
                <div class="diary-box-header">
                    <h3 id="selected-date-title">2026년 07월 11일</h3>
                    <span class="status-badge" id="save-status">조회 모드</span>
                </div>
                
                <div class="diary-textarea-wrapper">
                    <textarea id="diary-content" placeholder="오늘 하루는 어땠나요? 당신의 특별한 이야기를 기록해 보세요..."></textarea>
                </div>

                <div class="diary-action-bar">
                    <button class="diary-save-btn" id="btn-save-diary">💾 오늘의 일기 저장하기</button>
                </div>
            </section>

        </div>
    </main>

    <script src="/JS/diary-core.js"></script>
    <script>
        window.addEventListener('load', function() {
            // 임의 유저명 설정 (나중에 로그인 세션 연동 가능)
            document.getElementById('user-name-display').innerText = "하우스링크";

            let currentDate = new Date();
            let selectedDateStr = `${currentDate.getFullYear()}.${currentDate.getMonth()+1}.${currentDate.getDate()}`;

            const monthTitle = document.getElementById('calendar-month-title');
            const calendarBody = document.getElementById('calendar-body');
            const selectedDateTitle = document.getElementById('selected-date-title');
            const diaryContent = document.getElementById('diary-content');
            const saveStatus = document.getElementById('save-status');

            // 1. 다이어리 본문 로드 함수
            function loadDiary(dateStr) {
                const diaries = getDiaryData();
                const [year, month, day] = dateStr.split('.');
                selectedDateTitle.innerText = `${year}년 ${month.padStart(2, '0')}월 ${day.padStart(2, '0')}일`;
                
                if (diaries[dateStr]) {
                    diaryContent.value = diaries[dateStr];
                    saveStatus.innerText = "✏️ 작성된 일기 있음";
                    saveStatus.style.background = "#e0f2fe";
                    saveStatus.style.color = "#0369a1";
                } else {
                    diaryContent.value = "";
                    saveStatus.innerText = "⚪ 작성된 일기 없음";
                    saveStatus.style.background = "#f1f5f9";
                    saveStatus.style.color = "#64748b";
                }
            }

            // 2. 다이어리 달력 렌더링 함수
            function renderDiaryCalendar(date) {
                const year = date.getFullYear();
                const month = date.getMonth();

                monthTitle.innerText = `${year}년 ${String(month + 1).padStart(2, '0')}월`;

                const firstDayIndex = new Date(year, month, 1).getDay(); 
                const lastDate = new Date(year, month + 1, 0).getDate(); 
                const prevLastDate = new Date(year, month, 0).getDate(); 

                let htmlContent = '';
                let dayCounter = 1;
                let nextMonthCounter = 1;

                const diaries = getDiaryData(); // 아이콘 표시용 데이터

                for (let i = 0; i < 6; i++) {
                    let rowHtml = '<tr>';
                    for (let j = 0; j < 7; j++) {
                        let tdClass = '';
                        if (j === 0) tdClass = 'td-sun';
                        if (j === 6) tdClass = 'td-sat';

                        if (i === 0 && j < firstDayIndex) {
                            const prevDay = prevLastDate - (firstDayIndex - 1) + j;
                            rowHtml += `<td class="${tdClass} other-month"><span class="day-number">${prevDay}</span></td>`;
                        } 
                        else if (dayCounter <= lastDate) {
                            const isToday = (year === new Date().getFullYear() && month === new Date().getMonth() && dayCounter === new Date().getDate());
                            if (isToday) tdClass += ' today';

                            const thisCellStr = `${year}.${month+1}.${dayCounter}`;
                            if(selectedDateStr === thisCellStr) tdClass += ' selected-cell';

                            rowHtml += `<td class="${tdClass}" data-day="${dayCounter}">
                                <span class="day-number">${dayCounter}</span>`;
                            
                            // 일기가 작성된 날짜라면 달력 셀에 작은 연필 혹은 책 아이콘 표시
                            if (diaries[thisCellStr]) {
                                rowHtml += `<div class="diary-exist-dot">📝</div>`;
                            }

                            rowHtml += `</td>`;
                            dayCounter++;
                        } 
                        else {
                            rowHtml += `<td class="${tdClass} other-month"><span class="day-number">${nextMonthCounter}</span></td>`;
                            nextMonthCounter++;
                        }
                    }
                    rowHtml += '</tr>';
                    if (dayCounter > lastDate && i === 5) break;
                    htmlContent += rowHtml;
                }
                calendarBody.innerHTML = htmlContent;

                // 날짜 셀 클릭 이벤트
                const cells = calendarBody.querySelectorAll('td:not(.other-month)');
                cells.forEach(cell => {
                    cell.addEventListener('click', function() {
                        const prevSelected = calendarBody.querySelector('.selected-cell');
                        if(prevSelected) prevSelected.classList.remove('selected-cell');
                        this.classList.add('selected-cell');
                        
                        const clickedDay = this.getAttribute('data-day');
                        selectedDateStr = `${year}.${month+1}.${clickedDay}`;
                        loadDiary(selectedDateStr);
                    });
                });
            }

            // 3. 일기 저장 버튼 이벤트
            document.getElementById('btn-save-diary').addEventListener('click', function() {
                const content = diaryContent.value.trim();
                saveDiaryItem(selectedDateStr, content);
                alert("일기가 성공적으로 저장되었습니다!");
                renderDiaryCalendar(currentDate); // 달력의 아이콘 상태 새로고침
                loadDiary(selectedDateStr);
            });

            // 4. 달력 제어 버튼 이벤트
            document.getElementById('btn-prev').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderDiaryCalendar(currentDate);
            });
            document.getElementById('btn-next').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderDiaryCalendar(currentDate);
            });
            document.getElementById('btn-today').addEventListener('click', () => {
                currentDate = new Date();
                selectedDateStr = `${currentDate.getFullYear()}.${currentDate.getMonth()+1}.${currentDate.getDate()}`;
                renderDiaryCalendar(currentDate);
                loadDiary(selectedDateStr);
            });

            // 최초 화면 실행
            renderDiaryCalendar(currentDate);
            loadDiary(selectedDateStr);
        });
    </script>
</body>
</html>
