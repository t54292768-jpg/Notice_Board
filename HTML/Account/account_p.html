<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Link - 가계부</title>
    
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="account_p.css">

    <script src="/JS/header-loader.js" defer></script>
</head>
<body>

    <main class="account-page-container">
        <section class="budget-status-board">
            <div class="budget-box">
                <span class="box-label">🎯 이번 달 목표 예산</span>
                <div class="budget-value-zone">
                    <h2 id="display-budget">0원</h2>
                    <button class="btn-edit-budget" id="btn-set-budget">⚙️ 예산 변경</button>
                </div>
            </div>
            <div class="budget-box">
                <span class="box-label">💸 총 지출 금액</span>
                <h2 id="display-total-expense" style="color: #ef4444;">0원</h2>
            </div>
            <div class="budget-box">
                <span class="box-label">🏦 남은 예산</span>
                <h2 id="display-remain-budget" style="color: #10b981;">0원</h2>
            </div>
        </section>

        <div class="account-split-layout">
            
            <section class="account-form-panel">
                <h3>💰 오늘의 지출 기록</h3>
                <form id="account-form" onsubmit="return false;">
                    <div class="form-group">
                        <label for="expense-date">소비 날짜</label>
                        <input type="date" id="expense-date" required>
                    </div>

                    <div class="form-group">
                        <label for="expense-category">카테고리 선택</label>
                        <select id="expense-category" required>
                            <option value="생필품">🛒 생필품</option>
                            <option value="외식">🍕 외식</option>
                            <option value="여가">🎬 여가 / 문화</option>
                            <option value="병원">🏥 병원 / 약국</option>
                            <option value="교통">🚌 교통 / 차량</option>
                            <option value="기타">☕ 기타 소비</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="expense-title">지출 내역 (상세)</label>
                        <input type="text" id="expense-title" placeholder="예: 동네 마트 대파 및 계란 구매" required>
                    </div>

                    <div class="form-group">
                        <label for="expense-amount">지출 금액 (원)</label>
                        <input type="number" id="expense-amount" placeholder="숫자만 입력" required>
                    </div>

                    <button type="button" class="btn-submit-expense" id="btn-save-expense">💸 지출 등록하기</button>
                </form>
            </section>

            <section class="account-list-panel">
                <h3>📋 이번 달 지출 내역</h3>
                <div class="table-wrapper">
                    <table class="expense-table">
                        <thead>
                            <tr>
                                <th>날짜</th>
                                <th>카테고리</th>
                                <th>내역</th>
                                <th>금액</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="expense-list-body">
                            </tbody>
                    </table>
                </div>
            </section>

        </div>
    </main>

    <script src="/JS/account-core.js"></script>
    <script>
        window.addEventListener('load', function() {
            // 오늘 날짜 기본 지정
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('expense-date').value = today;

            // 대시보드 수치 & 리스트 갱신 함수
            function updateAccountDashboard() {
                const data = getAccountData();
                
                // 1) 총 지출 계산
                const totalExpense = data.expenses.reduce((sum, item) => sum + item.amount, 0);
                // 2) 남은 금액 계산
                const remainBudget = data.budget - totalExpense;

                // 화면 주입 (세 자릿수 콤마 포함)
                document.getElementById('display-budget').innerText = data.budget.toLocaleString() + "원";
                document.getElementById('display-total-expense').innerText = totalExpense.toLocaleString() + "원";
                document.getElementById('display-remain-budget').innerText = remainBudget.toLocaleString() + "원";

                // 3) 리스트 렌더링
                const listBody = document.getElementById('expense-list-body');
                if (data.expenses.length === 0) {
                    listBody.innerHTML = `<tr><td colspan="5" class="empty-row">이번 달 소비 내역이 없습니다. 가계부를 아껴보세요! 🌱</td></tr>`;
                    return;
                }

                listBody.innerHTML = data.expenses.map(item => `
                    <tr data-id="${item.id}">
                        <td class="t-date">${item.date.substring(5)}</td>
                        <td><span class="badge-cat cat-${getCatEngName(item.category)}">${item.category}</span></td>
                        <td class="t-title">${item.title}</td>
                        <td class="t-amount">${item.amount.toLocaleString()}원</td>
                        <td><button class="btn-del-expense">×</button></td>
                    </tr>
                `).join('');
            }

            // 카테고리별 CSS 뱃지 컬러 매칭을 위한 임시 영문 변환
            function getCatEngName(cat) {
                const map = { "생필품":"need", "외식":"food", "여가":"play", "병원":"hospital", "교통":"traffic", "기타":"etc" };
                return map[cat] || "etc";
            }

            // 예산 변경 버튼 이벤트
            document.getElementById('btn-set-budget').addEventListener('click', function() {
                const currentBudget = getAccountData().budget;
                const newBudget = prompt("한 달 목표 예산을 입력해 주세요 (숫자만):", currentBudget);
                if (newBudget === null) return;
                if (isNaN(newBudget) || newBudget < 0) return alert("올바른 숫자를 입력해 주세요.");
                
                updateBudget(newBudget);
                updateAccountDashboard();
            });

            // 지출 등록 버튼 이벤트
            document.getElementById('btn-save-expense').addEventListener('click', function() {
                const date = document.getElementById('expense-date').value;
                const category = document.getElementById('expense-category').value;
                const title = document.getElementById('expense-title').value.trim();
                const amount = document.getElementById('expense-amount').value;

                if (!date || !title || !amount) {
                    return alert("모든 항목을 정확하게 입력해 주세요!");
                }

                addExpenseItem(date, category, title, amount);
                
                // 인풋창 리셋 (날짜는 오늘로 유지)
                document.getElementById('expense-title').value = "";
                document.getElementById('expense-amount').value = "";
                
                updateAccountDashboard();
            });

            // 지출 내역 삭제 이벤트 (위임)
            document.getElementById('expense-list-body').addEventListener('click', function(e) {
                if (e.target.classList.contains('btn-del-expense')) {
                    const row = e.target.closest('tr');
                    const id = row.dataset.id;
                    const title = row.querySelector('.t-title').innerText;

                    if (confirm(`'${title}' 지출 내역을 삭제하시겠습니까?`)) {
                        deleteExpenseItem(id);
                        updateAccountDashboard();
                    }
                }
            });

            // 첫 가동
            updateAccountDashboard();
        });
    </script>
</body>
</html>
