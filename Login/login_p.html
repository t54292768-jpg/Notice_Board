<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 게시판</title>
  <link rel="stylesheet" href="login_p.css">
  
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">
        <i class="ti ti-layout-board"></i>
      </div>
      <div>
        <div class="brand-name">커뮤니티 게시판</div>
        <div class="brand-sub">로그인하고 활동을 시작하세요</div>
      </div>
    </div>

    <h2>로그인</h2>
    <p class="subtitle">아이디와 비밀번호를 입력하세요.</p>

    <div class="field">
      <label for="userid">아이디</label>
      <div class="input-wrap">
        <i class="ti ti-user icon"></i>
        <input type="text" id="userid" placeholder="아이디를 입력하세요" autocomplete="username">
      </div>
    </div>

    <div class="field">
      <label for="password">비밀번호</label>
      <div class="input-wrap">
        <i class="ti ti-lock icon"></i>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
        <button class="eye-btn" onclick="togglePw()" aria-label="비밀번호 표시/숨기기">
          <i class="ti ti-eye" id="eye-icon"></i>
        </button>
      </div>
    </div>

    <div class="row">
      <label class="remember">
        <input type="checkbox"> 로그인 상태 유지
      </label>
      <button class="forgot">아이디 · 비밀번호 찾기</button>
    </div>

    <button class="btn-login" onclick="handleLogin()">로그인</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">또는 소셜 계정으로</span>
      <div class="divider-line"></div>
    </div>

    <button class="btn-sns">
      <i class="ti ti-brand-google" aria-hidden="true"></i>
      Google로 계속하기
    </button>
    <button class="btn-sns">
      <i class="ti ti-brand-github" aria-hidden="true"></i>
      GitHub로 계속하기
    </button>

    <div class="footer">
      아직 계정이 없으신가요? <a href="#">회원가입</a>
    </div>
  </div>

  <script>
    function togglePw() {
      const pw = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.className = 'ti ti-eye-off';
      } else {
        pw.type = 'password';
        icon.className = 'ti ti-eye';
      }
    }

    function handleLogin() {
      const id = document.getElementById('userid').value.trim();
      const pw = document.getElementById('password').value;
      if (!id || !pw) {
        alert('아이디와 비밀번호를 모두 입력하세요.');
        return;
      }
      // TODO: 서버 API 호출 로직 추가
      alert('로그인 요청: ' + id);
    }
  </script>


</body>
</html>
