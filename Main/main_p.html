<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Link - 캘린더 & 듀얼 To-Do 대시보드</title>
    <link rel="stylesheet" href="main_p.css">
</head>
<body>
    <main class="dashboard-container">
        
        <section class="main-content">
            <div class="calendar-wrapper">
                <div class="calendar-header">
                    <h3 id="calendar-title">2026년 07월</h3>
                    <div class="calendar-btn-group">
                        <button class="cal-btn" id="btn-prev">이전달</button>
                        <button class="cal-btn" id="btn-today">오늘</button>
                        <button class="cal-btn" id="btn-next">다음달</button>
                    </div>
                </div>
                <div class="calendar-grid" id="calendar-grid">
                    <div class="day-of-week">일</div>
                    <div class="day-of-week">월</div>
                    <div class="day-of-week">화</div>
                    <div class="day-of-week">수</div>
                    <div class="day-of-week">목</div>
                    <div class="day-of-week">금</div>
                    <div class="day-of-week">토</div>
                </div>
            </div>
        </section>
    
        <aside class="side-content">
                
            <div class="todo-section personal-todo">
                <h3>👤 나의 할 일</h3>
                <div class="todo-input-box">
                    <input type="text" id="p-todo-input" placeholder="나만의 할 일 입력...">
                    <button class="todo-add-btn" id="p-todo-add-btn">추가</button>
                </div>
                <ul class="todo-list" id="p-todo-list"></ul>
            </div>

            <div class="todo-section family-todo">
                <h3>🏠 가족 공유 할 일</h3>
                <div class="todo-input-box">
                    <input type="text" id="f-todo-input" placeholder="가족 공동 할 일 입력...">
                    <button class="todo-add-btn" id="f-todo-add-btn">추가</button>
                </div>
                <ul class="todo-list" id="f-todo-list"></ul>
            </div>

        </aside>
    </main>

    <script src="/JS/todo-core.js"></script>
    <script src="/JS/calendar.js"></script>
    <script src="/JS/header-loader.js" defer></script>
    <script src="/JS/calendar-core.js"></script>
    <script>
            document.addEventListener("DOMContentLoaded", function() {
            // 1. 우측 투두리스트 최초 렌더링
            renderMainDashboardTodos();
                
            // 2. 입력창 및 버튼 이벤트 리스너 등록
            initTodoEvents();
        });

        function renderMainDashboardTodos() {
            // 💡 todo-core.js의 함수를 그대로 호출하여 데이터 로드
            const todos = getTodoData(); 
        
            // --- [1. 나의 할 일 미니 렌더링] ---
            const pTodoList = document.getElementById('p-todo-list');
            if (pTodoList) {
                // 미완료 개인 할 일만 추출
                const meTodos = todos.filter(t => t.type === 'me' && !t.checked);

                if (meTodos.length === 0) {
                    pTodoList.innerHTML = `<li style="color:#a0aec0; font-size:0.8rem; text-align:center; padding:12px 0; list-style:none;">남은 개인 할 일이 없습니다! 🎉</li>`;
                } else {
                    // dataset-id에 고유 id 저장
                    pTodoList.innerHTML = meTodos.map(item => `
                        <li class="todo-item" data-id="${item.id}" style="display:flex; align-items:center; background:#f8fafc; padding:10px 12px; border-radius:8px; border:1px solid #edf2f7; font-size:0.85rem; color:#334155; margin-bottom:8px;">
                            <input type="checkbox" id="p-todo-${item.id}" ${item.checked ? 'checked' : ''}>
                            <label for="p-todo-${item.id}" style="flex:1; margin-left:8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${item.text}</label>
                            <button class="todo-delete-btn" style="background:none; border:none; color:#a0aec0; cursor:pointer; font-size:1.1rem; line-height:1;">×</button>
                        </li>
                    `).join('');
                }
            }
        
            // --- [2. 가족 공유 할 일 미니 렌더링] ---
            const fTodoList = document.getElementById('f-list-todo') || document.getElementById('f-todo-list');
            if (fTodoList) {
                // 미완료 가족 할 일만 추출
                const familyTodos = todos.filter(t => t.type === 'family' && !t.checked);

                if (familyTodos.length === 0) {
                    fTodoList.innerHTML = `<li style="color:#a0aec0; font-size:0.8rem; text-align:center; padding:12px 0; list-style:none;">가족 공통 미션이 없습니다! 🙌</li>`;
                } else {
                    fTodoList.innerHTML = familyTodos.map(item => `
                        <li class="todo-item" data-id="${item.id}" style="display:flex; align-items:center; background:#fdf2f8; padding:10px 12px; border-radius:8px; border:1px solid #fce7f3; font-size:0.85rem; color:#9d174d; margin-bottom:8px;">
                            <input type="checkbox" id="f-todo-${item.id}" ${item.checked ? 'checked' : ''}>
                            <label for="f-todo-${item.id}" style="flex:1; margin-left:8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${item.text}</label>
                            <button class="todo-delete-btn" style="background:none; border:none; color:#f472b6; cursor:pointer; font-size:1.1rem; line-height:1;">×</button>
                        </li>
                    `).join('');
                }
            }
        }

        // 입력 버튼 및 클릭 핸들러 등록
        function initTodoEvents() {
            const pInput = document.getElementById('p-todo-input');
            const pAddBtn = document.getElementById('p-todo-add-btn');
            const fInput = document.getElementById('f-todo-input');
            const fAddBtn = document.getElementById('f-todo-add-btn');
        
            // A. 나의 할 일 추가
            if (pAddBtn && pInput) {
                pAddBtn.addEventListener('click', () => {
                    const text = pInput.value.trim();
                    if (!text) return;
                    addTodoItem(text, 'me'); // 💡 엔진 호출
                    pInput.value = '';
                    renderMainDashboardTodos(); // 다시 그리기
                });
                pInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') pAddBtn.click(); });
            }
        
            // B. 가족 공유 할 일 추가
            if (fAddBtn && fInput) {
                fAddBtn.addEventListener('click', () => {
                    const text = fInput.value.trim();
                    if (!text) return;
                    addTodoItem(text, 'family'); // 💡 엔진 호출
                    fInput.value = '';
                    renderMainDashboardTodos(); // 다시 그리기
                });
                fInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') fAddBtn.click(); });
            }
        
            // C. 체크박스 토글 및 삭제 버튼 이벤트 위임 (id 기반 처리)
            const sideContent = document.querySelector('.side-content');
            if (sideContent) {
                sideContent.addEventListener('click', function(e) {
                    const target = e.target;
                    const todoItem = target.closest('.todo-item');
                    if (!todoItem) return;

                    // HTML 엘리먼트에 심어둔 고유 ID 추출
                    const todoId = todoItem.dataset.id;
                
                    // 1) 삭제 버튼 클릭 시
                    if (target.classList.contains('todo-delete-btn')) {
                        const label = todoItem.querySelector('label').innerText;
                        if (confirm(`'${label}' 항목을 삭제하시겠습니까?`)) {
                            deleteTodoItem(todoId); // 💡 엔진 호출
                            renderMainDashboardTodos();
                        }
                    }

                    // 2) 체크박스 클릭 시
                    if (target.type === 'checkbox') {
                        toggleTodoItem(todoId); // 💡 엔진 호출
                        renderMainDashboardTodos();
                    }
                });
            }
        }
    </script>
</body>
</html>
