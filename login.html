<!DOCTYPE html>
 <!-- 문서 형식 선언(Document Type Declaration, 줄여서 DOCTYPE)  -->
<html lang="ko">
    <!-- html lang="en"은 웹 문서의 전체 시작을 알리는 <html> 태그에 "이 웹 페이지의 기본 언어는 영어(English)입니다"라고 브라우저에게 알려주는 속성(Attribute)
         ko = korean -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   
</body>
</html>
