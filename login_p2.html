<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 게시판</title>
  <link rel="stylesheet" href="login_p.css">
  <!-- Tabler Icons를 불러오는 CDN 링크 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
  <form name="logfrm" action="login_ok.php" method="post" onsubmit="return handleLogin(this.form);">
  <div class="card">
    <div class="brand">
      <div class="brand-icon">
        <i class="ti ti-layout-board"></i>
      </div>
      <div>
        <div class="brand-name">House Link</div>
        <div class="brand-sub">로그인하고 활동을 시작하세요</div>
      </div>
    </div>

    <h2>Login</h2>
    <p class="subtitle">아이디와 비밀번호를 입력하세요.</p>

    <div class="field">
      <label for="userid">ID</label>
      <div class="input-wrap">
        <i class="ti ti-user icon"></i>
        <input type="text" name="userid" id="userid" placeholder="아이디를 입력하세요" autocomplete="username">
      </div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <i class="ti ti-lock icon"></i>
        <input type="password" name="pw" id="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
        <button type = "button" class = "eye-btn" onclick="togglePw()" aria-label="비밀번호 표시/숨기기">
          <i class="ti ti-eye" id="eye-icon"></i>
        </button>
      </div>
    </div>

    <div class="row">
      <label class="remember">
        <input type="checkbox"> 자동 로그인
      </label>
      <button class="forgot">아이디 · 비밀번호 찾기</button>
    </div>

    <button type="submit" class="btn-login">Login</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">또는 소셜 계정으로</span>
      <div class="divider-line"></div>
    </div>

    <button class="btn-sns">
      <i class="ti ti-brand-google" aria-hidden="true"></i>
      Google로 계속하기
    </button>
    <button class="btn-sns">
      <i class="ti ti-brand-kakaotalk" aria-hidden="true"></i>
      Kakao로 계속하기
    </button>

    <div class="footer">
      아직 계정이 없으신가요? <a href="#">회원가입</a>
    </div>
  </div>
</form>
  <script language="javascript">
    function togglePw() {
      const pw = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (pw.type === 'password') {
        alert("pw");
        pw.type = 'text';
        icon.className = 'ti ti-eye-off';
      } else {
        pw.type = 'password';
        icon.className = 'ti ti-eye';
      }
    }

    function handleLogin() {
      /*
      const id = document.getElementById('userid').value.trim();
      const pw = document.getElementById('password').value;
      if (!id || !pw) {
        alert('아이디와 비밀번호를 모두 입력하세요.');
        return;
      }
      // TODO: 서버 API 호출 로직 추가
      //alert('로그인 요청: ' + id);
      //Get 방식 처리
      //document.location.href='login_ok.php?userid='+id+'&userpw='+pw;
      */
      //post 방식 처리
      var frm = document.logfrm;
      var userid = frm.userid.value;
      var pw = frm.pw.value;
      alert(userid+' / '+pw);
      if(userid==''){
        alert('아이디를 입력해 주세요');
        frm.userid.focus();
        return false;
      }
      if(pw==''){
        alert('비밀번호를 입력해 주세요');
        frm.pw.focus();
        return false;
      }
    
        frm.submit();
        return true;
    }
    function togglePw() {
      // 1. 비밀번호 input 창과 눈 모양 아이콘 엘리먼트를 가져옵니다.
      const pwInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eye-icon');

      // 2. 현재 상태가 'password'인지 확인합니다.
      if (pwInput.type === 'password') {
        // 가려진 상태 -> 보여주기 상태로 변경
        pwInput.type = 'text';

        // 아이콘 모양을 눈 가린 모양(ti-eye-off)으로 변경 (Tabler Icons 기준)
        eyeIcon.className = 'ti ti-eye-off'; 
      } else {
        // 보여지는 상태 -> 다시 가리기 상태로 변경
        pwInput.type = 'password';

        // 아이콘 모양을 원래 눈 모양(ti-eye)으로 변경
        eyeIcon.className = 'ti ti-eye';
      }
    }
  </script>
</body>
</html>
